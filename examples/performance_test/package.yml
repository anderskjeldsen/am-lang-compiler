id: "performance_test"
version: "1.0.0"
type: "application"
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
    url: https://github.com/anderskjeldsen/am-lang-core.git
  - id: am-tests
    testOnly: true
    realm: github
    type: git-repo
    tag: latest
    url: https://github.com/anderskjeldsen/am-tests.git

platforms:
  - id: "libc"
    abstract: true
  - id: "linux-x64"
    extends: "libc"
    gccCommand: "gcc -O3 -save-temps=obj"
  - id: "amigaos"
    extends: libc
    gccCommand: "m68k-amigaos-gcc -O3"
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul

buildTargets:
  - id: "linux-x64"
    platform: "linux-x64"
  - id: "amigaos-docker"
    platform: "amigaos"
    dockerBuild:
      image: amiga-gcc:latest
      buildPath: /host
